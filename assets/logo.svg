<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="100%" height="100%">
  <defs>
    <filter id="icon-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Rounded Red Square Icon -->
  <rect x="5" y="5" width="70" height="70" rx="18" fill="#D31212" filter="url(#icon-shadow)"/>
  <text x="40" y="49" 
        font-family="'Poppins', 'Montserrat', 'Inter', sans-serif" 
        font-size="34px" 
        font-weight="800" 
        fill="#FFFFFF" 
        text-anchor="middle">ID</text>
        
  <!-- Brand Name Text -->
  <text x="90" y="38" 
        font-family="'Poppins', 'Montserrat', 'Inter', sans-serif" 
        font-size="26px" 
        font-weight="700" 
        fill="#1A1D20">Investors</text>
        
  <text x="90" y="66" 
        font-family="'Poppins', 'Montserrat', 'Inter', sans-serif" 
        font-size="26px" 
        font-weight="700" 
        fill="#D31212">Deaal</text>
</svg>
